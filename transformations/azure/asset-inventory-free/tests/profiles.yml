azure_asset_inventory: # This should match the name in your dbt_project.yml
  target: dev
  outputs:
    dev-snowflake:
      type: snowflake
      account: "{{ env_var('SNOW_ACCOUNT') }}"

      # Key-pair auth
      user:  "{{ env_var('SNOW_USER') }}"
      private_key_path: "{{ env_var('SNOW_PRIVATE_KEY_PATH') }}"

      database: "{{ env_var('SNOW_DATABASE') }}"
      warehouse: "{{ env_var('SNOW_WAREHOUSE') }}"
      schema: "{{ env_var('SNOW_SCHEMA') }}"
    dev-pg:
      type: postgres
      host: 127.0.0.1
      user: postgres
      pass: pass
      port: 5432
      dbname: postgres
      schema: public # default schema where dbt will build the models
      threads: 1 # number of threads to use when running in parallel
    dev-bigquery:
      type: bigquery
      method: oauth
      project: cq-integration-tests
      dataset: policies_premium_ci_test # You can also use "schema" here
      threads: 4 # Must be a value of 1 or greater
      location: us-west1
